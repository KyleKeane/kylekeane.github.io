<header>
  <a href="#main-content">Skip to main content</a>

  <h1>{{ site.title }}</h1>

  <nav aria-label="Main navigation">
    <ul>
      {%- assign nav_pages = site.pages
         | where_exp: "p", "p.nav_include == true"
         | sort: "nav_order" -%}

      {%- for p in nav_pages -%}
        {%- if p.title -%}
          <li>
            <a href="{{ p.url | relative_url }}">{{ p.title }}</a>
          </li>
        {%- endif -%}
      {%- endfor -%}
    </ul>
  </nav>
</header>
