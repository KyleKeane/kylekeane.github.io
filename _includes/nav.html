<nav class="site-nav" aria-label="Primary navigation">
  <input
    type="checkbox"
    id="menu-toggle"
    class="site-nav__checkbox"
  />

  <label for="menu-toggle"
         class="site-nav__button"
         role="button"
         aria-haspopup="true"
         aria-controls="primary-navigation">
    <span class="site-nav__icon" aria-hidden="true"></span>
    <span class="site-nav__label">Menu</span>
  </label>

  <ul id="primary-navigation" class="site-nav__list">
    {% assign nav_pages = site.pages
         | where: "nav_include", true
         | sort: "nav_order" %}
    {% for p in nav_pages %}
      <li class="site-nav__item">
        <a href="{{ p.url | relative_url }}"
           class="site-nav__link{% if p.url == page.url %} site-nav__link--active{% endif %}">
          {{ p.title }}
        </a>
      </li>
    {% endfor %}
  </ul>
</nav>
