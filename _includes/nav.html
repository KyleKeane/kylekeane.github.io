<nav class="site-nav">
  <input type="checkbox" id="menu-toggle" class="site-nav__checkbox" />
  <label for="menu-toggle" class="site-nav__button">
    <span class="site-nav__icon"></span>
    <span class="site-nav__label">Menu</span>
  </label>

  <ul class="site-nav__list">
    {% assign nav_pages = site.pages
         | where: "nav_include", true
         | sort: "nav_order" %}
    {% for p in nav_pages %}
      <li class="site-nav__item">
        <a href="{{ p.url | relative_url }}"
           class="site-nav__link{% if p.url == page.url %} site-nav__link--active{% endif %}">
          {{ p.title }}
        </a>
      </li>
    {% endfor %}
  </ul>
</nav>
